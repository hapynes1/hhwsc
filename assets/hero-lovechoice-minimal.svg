<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Minimal hand-drawn love choice cover</title>
  <desc id="desc">Two hand-drawn characters walk under the night sky, with small choice cards around them.</desc>
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="8" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07" />
      </feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic" />
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

